:root{
--bg:#1a1208;--surface:#211a0e;--surface2:#2a2114;--border:#3d3020;
--accent:#c4922a;--accent2:#8fbcbb;--text:#ede0c8;--muted:#6e5e40;
--shadow:0 8px 40px rgba(0,0,0,0.5);
--r-bg:#8b1a1a;--d-bg:#1a3f8a;--u-bg:#111111;
--w-bg:#1a5c4a;--f-bg:#7a4800;--dr-bg:#3d2c7a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);
min-height:100vh;padding:28px 20px 60px;
background-image:
radial-gradient(ellipse 70% 40% at 50% 0%,rgba(196,146,42,0.07) 0%,transparent 65%),
repeating-linear-gradient(90deg,transparent,transparent 79px,rgba(196,146,42,0.03) 79px,rgba(196,146,42,0.03) 80px);
}
#app{max-width:1080px;margin:0 auto}
.hdr{margin-bottom:18px}
.hdr h1{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,4vw,42px);font-weight:700;color:var(--text);letter-spacing:-0.3px;line-height:1.1}
.hdr h1 em{color:var(--accent);font-style:italic}
.hdr p{font-size:12px;color:var(--muted);margin-top:5px;font-weight:300;letter-spacing:0.3px}
.cbs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cb{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;border:1px solid;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;cursor:pointer;transition:all .15s;user-select:none}
.cb:hover{filter:brightness(1.2);transform:translateY(-1px)}
.cb.active-sort{box-shadow:0 0 0 2px var(--accent),0 2px 8px rgba(0,0,0,0.4);transform:translateY(-1px)}
.cb-ec{background:rgba(196,146,42,.12);color:var(--accent);border-color:rgba(196,146,42,.3)}
.cb-fp{background:rgba(143,188,187,.1);color:var(--accent2);border-color:rgba(143,188,187,.3)}
.cb-cr{background:rgba(90,173,122,.1);color:#5aad7a;border-color:rgba(90,173,122,.3)}
.cb-cm{background:rgba(192,80,80,.1);color:#c05050;border-color:rgba(192,80,80,.3)}
.sort-hint{font-size:10px;color:var(--muted);margin-left:2px;font-family:'JetBrains Mono',monospace;letter-spacing:.3px;align-self:center}
.ctrls{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.ctrls select,.ctrls input{font-size:11px;padding:5px 9px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-family:'JetBrains Mono',monospace;}
.ctrls input::placeholder{color:var(--muted)}
.ctrls select option{background:var(--surface2)}
.mb{font-size:11px;padding:5px 11px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--muted);cursor:pointer;font-family:'JetBrains Mono',monospace;letter-spacing:.3px;transition:all .15s}
.mb.on{background:var(--surface);color:var(--accent);border-color:var(--accent)}
.mb:hover:not(:disabled){border-color:var(--muted);color:var(--text)}
#ml{display:flex;align-items:flex-start}
#lc{flex:1;min-width:0}
#lst{display:flex;flex-direction:column;gap:5px}
.pc{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:12px;background:var(--surface);cursor:pointer;transition:border-color .12s,background .12s;user-select:none;position:relative;overflow:hidden}
.pc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .15s;border-radius:2px 0 0 2px}
.pc:hover{border-color:var(--muted);background:var(--surface2)}
.pc:hover::before{background:var(--accent)}
.pc.sel{border-color:var(--accent)!important;border-width:1.5px}
.pc.sel::before{background:var(--accent)}
.pc.dg{opacity:.2}
.pc.dv{border-color:var(--accent2);background:rgba(143,188,187,0.05)}
.rn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--muted);min-width:22px;text-align:right;flex-shrink:0}
.rn.t3{color:var(--accent)}
.pavatar{width:46px;height:46px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--border);background:var(--surface2);overflow:hidden;position:relative}
.pavatar img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.pfallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--muted)}
.pinfo{flex:1;min-width:0}
.pn{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pm{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap}
.ptag{padding:1px 7px;border-radius:4px;font-size:9px;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;color:#fff!important;font-weight:600;text-transform:uppercase}
.pw{width:66px;flex-shrink:0}
.pl{font-size:9px;color:var(--muted);text-align:right;margin-bottom:3px;font-family:'JetBrains Mono',monospace}
.pb{height:3px;border-radius:2px;background:var(--surface2);overflow:hidden;border:1px solid var(--border)}
.pf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.dh{font-size:13px;color:var(--border);cursor:grab;padding:0 3px;flex-shrink:0;transition:color .12s}
.dh:hover{color:var(--muted)}
#sp{width:0;overflow:hidden;flex-shrink:0;transition:width .25s ease}
#pw2{width:360px;padding-left:12px}
#pi2{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;position:sticky;top:12px;box-shadow:var(--shadow)}
#pi2::before{content:'';display:block;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2),transparent 70%)}
.ph{padding:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.phi{width:60px;height:60px;border-radius:50%;flex-shrink:0;border:2px solid var(--border);background:var(--surface2);overflow:hidden}
.phi img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.phn{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:var(--text)}
.phs{font-size:10px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace}
.pcl{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-start;transition:all .12s}
.pcl:hover{background:var(--surface2);color:var(--text)}
.sr{display:flex;gap:4px;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.sp2{flex:1;min-width:52px;text-align:center;padding:6px 2px;border-radius:8px;border:1px solid var(--border);background:var(--surface2)}
.sn{font-size:16px;font-weight:600;color:var(--text);font-family:'Cormorant Garamond',serif}
.sl{font-size:8px;color:var(--muted);display:block;margin-top:2px;line-height:1.3;font-family:'JetBrains Mono',monospace;letter-spacing:.3px}
.bd{padding:13px 14px;max-height:70vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.bd::-webkit-scrollbar{width:4px}
.bd::-webkit-scrollbar-track{background:var(--surface2)}
.bd::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.bd h3{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;color:var(--accent);margin:13px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.1em}
.bd h3:first-child{margin-top:0}
.bd p{font-size:12.5px;color:var(--text);line-height:1.7;margin-bottom:5px;opacity:.85}
.bd ul{margin:3px 0 9px 14px}
.bd li{margin-bottom:6px;font-size:12px;color:var(--text);line-height:1.6;opacity:.8}
.bd li strong{font-weight:500;color:var(--accent);opacity:1}
.tl{margin:5px 0 8px;padding-left:16px;border-left:1.5px solid var(--border)}
.ti{margin-bottom:10px;position:relative}
.ti::before{content:'';position:absolute;left:-20px;top:5px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:2px solid var(--surface)}
.ty{font-size:10px;font-weight:600;color:var(--accent);font-family:'JetBrains Mono',monospace}
.te{font-size:12px;color:var(--text);margin-top:2px;line-height:1.55;opacity:.8}

/* iOS safe area padding */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  body { padding-bottom: calc(60px + env(safe-area-inset-bottom)); }

/* Mobile panel overlay */
@media (max-width: 680px) {
  #sp { position: fixed; right: 0; top: 0; bottom: 0; z-index: 100; width: 0 !important; transition: none; }
  #sp.open { width: 100vw !important; }
  #pw2 { width: 100vw; max-width: 100vw; padding: 0; height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  #pi2 { border-radius: 0; height: auto; min-height: 100vh; border: none; position: static; }
  .bd { max-height: none; overflow-y: visible; }
}
</style>
</head>

<div id="app">

  <button class="mb" id="bcs" disabled>Custom order</button>
</div>
<div id="ml">
  <div id="lc"><div id="lst"></div></div>
  <div id="sp"><div id="pw2"><div id="pi2">
    <div id="phd" class="ph"></div>

</div>
</div>

{ec:"Presided over the greatest peacetime economic expansion in American history to that point. The Interstate Highway System transformed commerce and daily life.",fp:"Ended the Korean War and avoided direct conflict throughout multiple Cold War crises.",cr:"Sent federal troops to enforce desegregation at Little Rock (1957). Signed the Civil Rights Acts of 1957 and 1960.",cm:"Managed the Suez Crisis (1956) by pressuring U.S. allies to withdraw — a remarkable assertion of American power.",laws:[["Federal Aid Highway Act","1956","Built the 41,000-mile Interstate Highway System"],["Civil Rights Act of 1957","1957","First civil rights legislation since Reconstruction"],["National Defense Education Act","1958","Funded science and math education after Sputnik"]],tl:[[1953,"Korean War armistice signed"],[1956,"Interstate Highway Act signed"],[1957,"Federal troops sent to Little Rock, Arkansas"],[1957,"Sputnik launched — Space Race began"],[1961,"Farewell address warned of the military-industrial complex"]]},
{ec:"Proposed the tax cuts — passed after his death — that stimulated strong economic growth. Launched the Alliance for Progress.",fp:"Resolved the Cuban Missile Crisis (1962) through extraordinary 13-day diplomacy. Launched the Peace Corps.",cr:"Proposed landmark civil rights legislation and deployed federal power to integrate universities.",cm:"The Cuban Missile Crisis (October 1962) was his finest hour — 13 days that prevented nuclear war. The Bay of Pigs (1961) was his most visible failure.",laws:[["Peace Corps","1961","Established the international volunteer development program"],["Nuclear Test Ban Treaty","1963","Prohibited atmospheric nuclear weapons testing"]],tl:[[1961,"Bay of Pigs invasion failed"],[1961,"Peace Corps established; Berlin Wall built"],[1962,"Cuban Missile Crisis — 13 days at the nuclear brink"],[1963,"March on Washington; Civil Rights bill sent to Congress"],[1963,"Assassinated in Dallas, November 22"]]},
{ec:"The Great Society — Medicare, Medicaid, and federal education funding — transformed the safety net permanently. Vietnam-era spending caused inflation and fiscal strain.",fp:"Escalated Vietnam War to 500,000 troops, resulting in 58,000 American deaths and strategic defeat.",cr:"The Civil Rights Act (1964) and Voting Rights Act (1965) are the most transformative civil rights laws since the 13th Amendment.",cm:"Managed JFK's assassination aftermath with remarkable skill. Urban riots and Vietnam protests exposed deep failures as the country fractured in 1967–68.",laws:[["Civil Rights Act","1964","Banned discrimination based on race, color, religion, sex, or national origin"],["Voting Rights Act","1965","Eliminated barriers to Black voter participation"],["Medicare and Medicaid","1965","Federal health insurance for elderly and low-income Americans"],["Fair Housing Act","1968","Banned discrimination in housing sales and rentals"]],tl:[[1963,"Assumed presidency after Kennedy's assassination"],[1964,"Civil Rights Act signed; Gulf of Tonkin Resolution"],[1965,"Voting Rights Act and Medicare/Medicaid signed"],[1967,"Major urban riots across America"],[1968,"Announced he would not seek reelection"]]},
{ec:"Ended the dollar's gold convertibility (Nixon Shock, 1971). Created the EPA and OSHA.",fp:"Opened diplomatic relations with China (1972). Détente produced SALT I. Ended direct U.S. military involvement in Vietnam.",cr:"Signed the Clean Air Act, Clean Water Act, and created the EPA. Extended the Voting Rights Act.",cm:"The Watergate cover-up forced the only presidential resignation in U.S. history.",laws:[["Environmental Protection Agency","1970","Created the federal environmental regulatory agency"],["Clean Air Act","1970","Set national air quality standards"],["SALT I Treaty","1972","First major nuclear arms limitation agreement"],["Paris Peace Accords","1973","Ended direct U.S. military involvement in Vietnam"]],tl:[[1969,"Apollo 11 — first humans on the moon"],[1970,"EPA created; Kent State shootings"],[1971,"Nixon Shock — ended dollar-gold convertibility"],[1972,"Opened China; SALT I signed"],[1974,"Resigned to avoid certain impeachment"]]},

{ec:"Broke his 'Read my lips: no new taxes' pledge to address the deficit — fiscally responsible but politically fatal.",fp:"Masterfully managed the Cold War's end and German reunification. Led a 34-nation coalition to expel Iraq from Kuwait in 100 hours.",cr:"Signed the Americans with Disabilities Act (1990), protecting 43 million disabled Americans.",cm:"The Gulf War coalition was assembled and executed with extraordinary diplomatic and military skill.",laws:[["Americans with Disabilities Act","1990","Prohibited discrimination against 43 million disabled Americans"],["Clean Air Act Amendments","1990","Significantly strengthened air pollution controls"],["Budget Enforcement Act","1990","Raised taxes to reduce the deficit"]],tl:[[1989,"Berlin Wall fell — German reunification managed skillfully"],[1990,"ADA signed"],[1991,"Gulf War — Iraq expelled from Kuwait in 100 hours"],[1991,"Soviet Union dissolved"],[1992,"Lost reelection to Bill Clinton"]]},

{ec:"Broad reciprocal tariff regime — the most aggressive trade protectionism since Smoot-Hawley — imposed on most trading partners. Federal restructuring through DOGE reduced government spending.",fp:"Geopolitical reshaping of alliances underway, including pressuring NATO on defense spending and engaging Russia over Ukraine peace.",cr:"Executive orders dismantled DEI programs across the federal government. Immigration enforcement reached record levels with mass deportation operations.",cm:"Second term ongoing as of early 2026. Navigating tariff-related market volatility and controversy surrounding rapid federal restructuring.",laws:[["DOGE Executive Actions","2025","Federal workforce and spending reductions through executive authority"],["Tariff Executive Orders","2025","Broad reciprocal tariffs imposed on most U.S. trading partners"]],tl:[[2025,"Second inauguration on January 20"],[2025,"Broad tariff regime imposed on trading partners"],[2025,"DOGE federal workforce reduction initiated"],[2025,"Mass deportation operations launched"]]}

function avg(x){return Math.round((x.ec+x.fp+x.cr+x.cm)/4)}
const dOrd=[...PR.keys()].sort((a,b)=>avg(PR[b])-avg(PR[a]));
let ord=[...dOrd],active=null,dragSrc=null,activeSort=null;
const SORT_LABELS={ec:'Economic',fp:'Foreign policy',cr:'Civil rights',cm:'Crisis mgmt'};

function sortBy(key,el){
if(activeSort===key){activeSort=null;document.querySelectorAll('.cb').forEach(c=>c.classList.remove('active-sort'));document.querySelectorAll('.cb').forEach(c=>c.textContent=c.textContent.replace(/^[▲▼] /,'⬆ '));document.getElementById('sort-hint').textContent='';ord=[...dOrd];document.getElementById('bdf').classList.add('on');document.getElementById('bcs').classList.remove('on');render();return;}
activeSort=key;document.querySelectorAll('.cb').forEach(c=>{c.classList.remove('active-sort');c.textContent=c.textContent.replace(/^[▲▼⬆] /,'⬆ ')});el.classList.add('active-sort');el.textContent='▲ '+SORT_LABELS[key];document.getElementById('sort-hint').textContent='↑ sorted by '+SORT_LABELS[key].toLowerCase();ord=[...PR.keys()].sort((a,b)=>PR[b][key]-PR[a][key]);document.getElementById('bdf').classList.remove('on');document.getElementById('bcs').classList.remove('on');render();
}

function makeAvatar(imgSrc,name,big){
const ini=name.split(' ').filter((_,i,a)=>i===0||i===a.length-1).map(w=>w[0]).join('').toUpperCase();
const cls=big?'phi':'pavatar';
return `<div class="${cls}"><img src="${imgSrc}" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="pfallback" style="display:none">${ini}</div></div>`;
}
function partyTag(party){const pt=PARTY_TAG[party]||{bg:"var(--u-bg)"};const lbl=PARTY_LABEL[party]||party;return `<span class="ptag" style="background:${pt.bg}">${lbl}</span>`;}

function render(){
const s=document.getElementById('srch').value.toLowerCase();
const pf=document.getElementById('pf').value;
const lst=document.getElementById('lst');
lst.innerHTML='';let pos=0;
ord.forEach(pi=>{
const p=PR[pi];
if(s&&!p.n.toLowerCase().includes(s))return;
if(pf&&p.p!==pf)return;
const sc=avg(p);
const dispScore=activeSort?p[activeSort]:sc;
const dispLabel=activeSort?SORT_LABELS[activeSort]:'Overall';
const el=document.createElement('div');
el.className='pc'+(active===pi?' sel':'');
el.dataset.pi=pi;el.dataset.pos=pos;el.draggable=true;
el.innerHTML=`<span class="rn${pos<3?' t3':''}">${pos+1}</span>${makeAvatar(p.i,p.n,false)}<div class="pinfo"><div class="pn">${p.n}</div><div class="pm">${partyTag(p.p)}<span>${p.y} · #${p.num}</span></div></div><div class="pw"><div class="pl">${dispScore}/100</div><div class="pb"><div class="pf" style="width:${dispScore}%"></div></div></div><span class="dh" title="Drag to reorder">⠿</span>`;
el.addEventListener('click',e=>{if(!e.target.classList.contains('dh'))openPanel(pi)});
el.addEventListener('dragstart',e=>{dragSrc=+e.currentTarget.dataset.pos;setTimeout(()=>e.currentTarget.classList.add('dg'),0);e.dataTransfer.effectAllowed='move'});
el.addEventListener('dragover',e=>{e.preventDefault();document.querySelectorAll('.pc').forEach(c=>c.classList.remove('dv'));e.currentTarget.classList.add('dv')});
el.addEventListener('drop',e=>{e.preventDefault();const t=+e.currentTarget.dataset.pos;if(dragSrc!==null&&dragSrc!==t){const m=ord.splice(dragSrc,1)[0];ord.splice(t,0,m);dragSrc=null;setCustom();render()}});
el.addEventListener('dragend',()=>document.querySelectorAll('.pc').forEach(c=>{c.classList.remove('dg');c.classList.remove('dv')}));
lst.appendChild(el);pos++;
});
}

function setCustom(){activeSort=null;document.querySelectorAll('.cb').forEach(c=>{c.classList.remove('active-sort');c.textContent=c.textContent.replace(/^[▲▼⬆] /,'⬆ ')});document.getElementById('sort-hint').textContent='';document.getElementById('bcs').disabled=false;document.getElementById('bcs').classList.add('on');document.getElementById('bdf').classList.remove('on');}
function resetOrder(){activeSort=null;document.querySelectorAll('.cb').forEach(c=>{c.classList.remove('active-sort');c.textContent=c.textContent.replace(/^[▲▼⬆] /,'⬆ ')});document.getElementById('sort-hint').textContent='';ord=[...dOrd];document.getElementById('bdf').classList.add('on');document.getElementById('bcs').classList.remove('on');document.getElementById('bcs').disabled=true;render();}

function openPanel(pi){
const p=PR[pi],a=AN[pi],sc=avg(p);
active=pi;
const sp=document.getElementById('sp');
sp.style.width='360px';
if(window.innerWidth<=680){sp.classList.add('open');}
document.getElementById('phd').innerHTML=`${makeAvatar(p.i,p.n,true)}<div style="flex:1;min-width:0"><div class="phn">${p.n}</div><div class="phs">${partyTag(p.p)}<span>${p.y} · #${p.num}</span></div></div><button class="pcl" onclick="closePanel()">✕</button>`;
document.getElementById('psr').innerHTML=`<div class="sp2"><div class="sn">${p.ec}</div><span class="sl">Economic</span></div><div class="sp2"><div class="sn">${p.fp}</div><span class="sl">Foreign policy</span></div><div class="sp2"><div class="sn">${p.cr}</div><span class="sl">Civil rights</span></div><div class="sp2"><div class="sn">${p.cm}</div><span class="sl">Crisis mgmt</span></div><div class="sp2" style="border-color:rgba(196,146,42,.4);background:rgba(196,146,42,.08)"><div class="sn" style="color:var(--accent)">${sc}</div><span class="sl" style="color:var(--accent)">Avg</span></div>`;
const lh=a.laws.map(l=>`<li><strong>${l[0]} (${l[1]})</strong> — ${l[2]}</li>`).join('');
const th=a.tl.map(t=>`<div class="ti"><div class="ty">${t[0]}</div><div class="te">${t[1]}</div></div>`).join('');
document.getElementById('pbd').innerHTML=`<h3>Economic impact</h3><p>${a.ec}</p><h3>Foreign policy</h3><p>${a.fp}</p><h3>Civil rights &amp; social progress</h3><p>${a.cr}</p><h3>Crisis management</h3><p>${a.cm}</p><h3>Key legislation</h3><ul>${lh}</ul><h3>Timeline</h3><div class="tl">${th}</div>`;
render();
setTimeout(()=>{const u=document.querySelector(`.pc[data-pi="${pi}"]`);if(u)u.scrollIntoView({behavior:'smooth',block:'start'})},60);
}

function closePanel(){
const sp=document.getElementById('sp');
sp.style.width='0';sp.classList.remove('open');
active=null;render();
}

document.getElementById('srch').addEventListener('input',render);
document.getElementById('pf').addEventListener('change',render);
render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[PWA] Service worker registered:', reg.scope))
      .catch(err => console.warn('[PWA] Service worker registration failed:', err));
  });
}
</script>
